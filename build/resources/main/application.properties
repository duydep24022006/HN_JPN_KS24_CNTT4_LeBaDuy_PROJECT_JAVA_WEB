spring.application.name=hotpital_wed2

# thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.mode=HTML

# datasource - credentials từ biến môi trường
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true}
spring.datasource.username=root
spring.datasource.password=dUYDEP24022006

# jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.messages.basename=messages
spring.messages.encoding=UTF-8

server.servlet.session.persistent=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Upload directory
app.upload.dir=${user.home}/hospital-uploads
