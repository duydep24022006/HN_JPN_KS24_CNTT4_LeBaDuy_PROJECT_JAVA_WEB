<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | Smart Healthcare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --sh-blue: #1a5fb4; --sh-blue-dark: #1353a0; --sh-blue-light: #e8f0fb; --sidebar-w: 220px; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f9; height: 100vh; display: flex; }
        .sidebar { width: var(--sidebar-w); background: var(--sh-blue-dark); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; position: fixed; left: 0; top: 0; }
        .sidebar-logo { padding: 20px 18px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-icon { width: 32px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--sh-blue-dark); font-weight: 700; font-size: 16px; }
        .logo-text { color: white; font-size: 14px; font-weight: 600; line-height: 1.2; }
        .logo-sub { color: rgba(255,255,255,0.6); font-size: 10px; }
        .nav-section { padding: 12px 0 4px; }
        .nav-label { padding: 4px 16px; font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 13px; transition: all 0.15s; border-left: 3px solid transparent; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: rgba(255,255,255,0.13); color: white; border-left-color: white; }
        .nav-item i { font-size: 16px; width: 18px; text-align: center; }
        .nav-badge { margin-left: auto; background: #ef4444; color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
        .sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.15s; }
        .admin-info:hover { background: rgba(255,255,255,0.08); }
        .admin-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; flex-shrink: 0; }
        .admin-name { color: white; font-size: 12px; font-weight: 500; }
        .admin-role { color: rgba(255,255,255,0.5); font-size: 10px; }
        .main { flex: 1; display: flex; flex-direction: column; margin-left: var(--sidebar-w); height: 100vh; overflow: hidden; }
        .topbar { background: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
        .page-title { font-size: 16px; font-weight: 500; color: #111827; }
        .page-sub { font-size: 12px; color: #6b7280; margin-top: 1px; }
        .topbar-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #e5e7eb; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #6b7280; font-size: 16px; transition: background 0.15s; position: relative; }
        .icon-btn:hover { background: #f9fafb; }
        .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: #ef4444; border-radius: 50%; border: 1.5px solid white; }
        .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; margin-bottom: 16px; overflow: hidden; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e5e7eb; background: white; color: #374151; display: inline-flex; align-items: center; gap: 5px; transition: background 0.15s; text-decoration: none; }
        .btn-sm:hover { background: #f9fafb; }
        .btn-primary { background: var(--sh-blue); color: white; border-color: var(--sh-blue); }
        .btn-primary:hover { background: var(--sh-blue-dark); }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; display: inline-block; }
        .badge-green { background: #dcfce7; color: #15803d; }
        .badge-amber { background: #fef3c7; color: #b45309; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 11px; color: #6b7280; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { padding: 7px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px; background: white; color: #111827; outline: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--sh-blue); }
        .form-group textarea { resize: none; height: 64px; }
        .form-group input:disabled { background: #f1f5f9; color: #9ca3af; cursor: not-allowed; }
        .field-error { color: #dc2626; font-size: 11px; margin-top: 2px; }
        .input-error { border-color: #dc2626 !important; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .avatar-section { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; padding: 14px; background: var(--sh-blue-light); border-radius: 10px; }
        .big-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--sh-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; overflow: hidden; }
        .big-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-info .name { font-size: 14px; font-weight: 500; color: #111827; }
        .role-tag { font-size: 11px; color: var(--sh-blue); background: white; border: 1px solid var(--sh-blue); border-radius: 4px; padding: 1px 8px; margin-top: 4px; display: inline-block; }
        .section-title { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f1f5f9; }
        /* Flash messages */
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
        /* Avatar preview */
        #avatarPreview { display: none; margin-top: 8px; }
        #avatarPreview img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--sh-blue); }
    </style>
</head>
<body>
<div th:replace="~{layout/layout :: sidebar}"></div>
<div class="main">
    <div class="topbar">
        <div>
            <div class="page-title">Hồ sơ cá nhân</div>
            <div class="page-sub">Quản lý thông tin tài khoản Admin</div>
        </div>
        <div class="topbar-actions">
            <div class="icon-btn"><i class="ti ti-search"></i></div>
            <div class="icon-btn"><i class="ti ti-bell"></i><div class="notif-dot"></div></div>
            <div class="icon-btn"><i class="ti ti-settings"></i></div>
        </div>
    </div>

    <div class="content">

        <!-- ── Flash messages ── -->
        <div th:if="${successMessage}" class="alert alert-success">
            <i class="ti ti-circle-check"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error">
            <i class="ti ti-alert-circle"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${passwordError}" class="alert alert-error">
            <i class="ti ti-alert-circle"></i>
            <span th:text="${passwordError}"></span>
        </div>

        <!-- ── Avatar section ── -->
        <div class="avatar-section">
            <div class="big-avatar">
                <img th:if="${profile?.avatarUrl != null}"
                     th:src="@{/uploads/{f}(f=${profile.avatarUrl})}"
                     alt="avatar" />
                <span th:unless="${profile?.avatarUrl != null}"
                      th:text="${#strings.substring(profile?.fullName ?: 'AD', 0, 2)}">AD</span>
            </div>
            <div class="avatar-info">
                <div class="name" th:text="${profile?.fullName ?: 'Admin'}">Admin</div>
                <div class="role-tag">Quản trị viên</div>
            </div>
            <!-- Nút đổi ảnh trigger input file ẩn (form update sẽ xử lý) -->
            <button type="button" class="btn-sm" style="margin-left:auto"
                    onclick="document.getElementById('avatarFileInput').click()">
                <i class="ti ti-camera"></i> Đổi ảnh
            </button>
        </div>

        <div class="two-col">

            <!-- ════════════════════════════════════════════
                 FORM 1: Cập nhật thông tin cá nhân
                 ════════════════════════════════════════════ -->
            <div class="card" style="padding:16px">
                <div class="section-title">Thông tin cá nhân</div>

                <form th:action="@{/admin/profile/update}"
                      th:object="${updateRequest}"
                      method="post"
                      enctype="multipart/form-data"
                      id="updateProfileForm">

                    <!-- Input file ẩn cho avatar -->
                    <input type="file" id="avatarFileInput" name="avatarFile"
                           accept="image/jpeg,image/png,image/webp,image/gif"
                           style="display:none"
                           onchange="previewAvatar(this)" />

                    <!-- Preview ảnh mới chọn -->
                    <div id="avatarPreview">
                        <img id="avatarPreviewImg" src="#" alt="preview" />
                        <span style="font-size:11px;color:#6b7280;margin-left:8px">Ảnh mới (chưa lưu)</span>
                    </div>
                    <div th:if="${avatarError}" class="field-error" style="margin-bottom:8px"
                         th:text="${avatarError}"></div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Họ và tên <span style="color:#dc2626">*</span></label>
                            <input type="text" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'input-error'" />
                            <span class="field-error" th:if="${#fields.hasErrors('fullName')}"
                                  th:errors="*{fullName}"></span>
                        </div>
                        <div class="form-group">
                            <label>Tên đăng nhập</label>
                            <input type="text" th:value="${profile?.username}" disabled />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" th:value="${profile?.email}" disabled />
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input type="text" th:field="*{phoneNumber}"
                                   th:classappend="${#fields.hasErrors('phoneNumber')} ? 'input-error'"
                                   placeholder="0912345678" />
                            <span class="field-error" th:if="${#fields.hasErrors('phoneNumber')}"
                                  th:errors="*{phoneNumber}"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Giới tính</label>
                            <select th:field="*{gender}">
                                <option value="">-- Chọn --</option>
                                <option value="MALE">Nam</option>
                                <option value="FEMALE">Nữ</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ngày sinh</label>
                            <input type="date" th:field="*{dateOfBirth}"
                                   th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'input-error'" />
                            <span class="field-error" th:if="${#fields.hasErrors('dateOfBirth')}"
                                  th:errors="*{dateOfBirth}"></span>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom:12px">
                        <label>Địa chỉ</label>
                        <textarea th:field="*{address}"
                                  th:classappend="${#fields.hasErrors('address')} ? 'input-error'"
                                  placeholder="Nhập địa chỉ..."></textarea>
                        <span class="field-error" th:if="${#fields.hasErrors('address')}"
                              th:errors="*{address}"></span>
                    </div>

                    <div class="form-group" style="margin-bottom:14px">
                        <label>Số CCCD / CMND</label>
                        <input type="text" th:field="*{identityCard}"
                               th:classappend="${#fields.hasErrors('identityCard')} ? 'input-error'"
                               placeholder="012345678901" />
                        <span class="field-error" th:if="${#fields.hasErrors('identityCard')}"
                              th:errors="*{identityCard}"></span>
                    </div>

                    <div style="display:flex;justify-content:flex-end">
                        <button type="submit" class="btn-sm btn-primary">
                            <i class="ti ti-device-floppy"></i> Lưu thay đổi
                        </button>
                    </div>
                </form>
            </div>

            <!-- Cột phải -->
            <div>

                <!-- ════════════════════════════════════════════
                     FORM 2: Đổi mật khẩu
                     ════════════════════════════════════════════ -->
                <div class="card" style="padding:16px;margin-bottom:16px">
                    <div class="section-title">Đổi mật khẩu</div>

                    <form th:action="@{/admin/profile/change-password}"
                          th:object="${changePasswordRequest}"
                          method="post"
                          id="changePasswordForm">

                        <div class="form-group" style="margin-bottom:10px">
                            <label>Mật khẩu hiện tại <span style="color:#dc2626">*</span></label>
                            <input type="password" th:field="*{currentPassword}"
                                   placeholder="••••••••"
                                   autocomplete="current-password" />
                        </div>

                        <div class="form-group" style="margin-bottom:10px">
                            <label>Mật khẩu mới <span style="color:#dc2626">*</span></label>
                            <input type="password" th:field="*{newPassword}"
                                   placeholder="••••••••"
                                   autocomplete="new-password"
                                   id="newPwd" />
                        </div>

                        <div class="form-group" style="margin-bottom:14px">
                            <label>Xác nhận mật khẩu mới <span style="color:#dc2626">*</span></label>
                            <input type="password" th:field="*{confirmNewPassword}"
                                   placeholder="••••••••"
                                   autocomplete="new-password"
                                   id="confirmPwd" />
                            <!-- Client-side mismatch hint -->
                            <span id="pwdMismatch" class="field-error" style="display:none">
                                Mật khẩu xác nhận không khớp
                            </span>
                        </div>

                        <div style="display:flex;justify-content:flex-end">
                            <button type="submit" class="btn-sm btn-primary"
                                    onclick="return validatePasswordForm()">
                                <i class="ti ti-lock"></i> Cập nhật mật khẩu
                            </button>
                        </div>
                    </form>
                </div>

                <!-- ── Thông tin tài khoản (chỉ đọc) ── -->
                <div class="card" style="padding:16px">
                    <div class="section-title">Thông tin tài khoản</div>
                    <table style="width:100%;font-size:12px">
                        <tr>
                            <td style="color:#6b7280;padding:5px 0">Vai trò</td>
                            <td style="text-align:right">
                                <span class="badge badge-blue" th:text="${profile?.role}">Admin</span>
                            </td>
                        </tr>
                        <tr>
                            <td style="color:#6b7280;padding:5px 0">Trạng thái</td>
                            <td style="text-align:right">
                                <span class="badge"
                                      th:classappend="${profile?.active} ? 'badge-green' : 'badge-amber'"
                                      th:text="${profile?.active ? 'Hoạt động' : 'Khoá'}">--</span>
                            </td>
                        </tr>
                        <tr>
                            <td style="color:#6b7280;padding:5px 0">Ngày tạo tài khoản</td>
                            <td style="text-align:right"
                                th:text="${profile?.createdAt != null
                                    ? #temporals.format(profile.createdAt, 'dd/MM/yyyy')
                                    : '--'}">--</td>
                        </tr>
                        <tr>
                            <td style="color:#6b7280;padding:5px 0">Tên đăng nhập</td>
                            <td style="text-align:right"
                                th:text="${profile?.username ?: '--'}">--</td>
                        </tr>
                        <tr>
                            <td style="color:#6b7280;padding:5px 0">Email</td>
                            <td style="text-align:right"
                                th:text="${profile?.email ?: '--'}">--</td>
                        </tr>
                    </table>
                </div>

            </div><!-- /cột phải -->
        </div><!-- /two-col -->
    </div><!-- /content -->
</div><!-- /main -->

<script>
    // Preview ảnh đại diện trước khi submit
    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatarPreviewImg').src = e.target.result;
                document.getElementById('avatarPreview').style.display = 'flex';
                document.getElementById('avatarPreview').style.alignItems = 'center';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Validate client-side: mật khẩu mới và xác nhận phải khớp
    function validatePasswordForm() {
        const newPwd = document.getElementById('newPwd').value;
        const confirmPwd = document.getElementById('confirmPwd').value;
        const hint = document.getElementById('pwdMismatch');

        if (newPwd && confirmPwd && newPwd !== confirmPwd) {
            hint.style.display = 'block';
            document.getElementById('confirmPwd').classList.add('input-error');
            return false;
        }
        hint.style.display = 'none';
        document.getElementById('confirmPwd').classList.remove('input-error');
        return true;
    }

    // Ẩn hint khi user gõ lại
    document.addEventListener('DOMContentLoaded', function() {
        const newPwd = document.getElementById('newPwd');
        const confirmPwd = document.getElementById('confirmPwd');
        if (newPwd && confirmPwd) {
            [newPwd, confirmPwd].forEach(function(el) {
                el.addEventListener('input', function() {
                    document.getElementById('pwdMismatch').style.display = 'none';
                    confirmPwd.classList.remove('input-error');
                });
            });
        }
    });
</script>
</body>
</html>
