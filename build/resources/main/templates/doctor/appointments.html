<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lịch hẹn bệnh nhân | Smart Healthcare</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1e40af;--primary-dark:#1340a8;--primary-light:#dbeafe;
  --doctor:#0d9488;--doctor-dark:#0f766e;--doctor-light:#ccfbf1;
  --accent:#10b981;--accent-light:#d1fae5;
  --warning:#f59e0b;--warning-light:#fef3c7;
  --danger:#ef4444;--danger-light:#fee2e2;
  --text:#1f2937;--sub:#64748b;--border:#e5e7eb;--bg:#f8fafc;--white:#fff;
  --sw:260px;--r:14px
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);display:flex;min-height:100vh;color:var(--text)}

/* ── Sidebar ── */
.sidebar{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.06)}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--doctor),var(--doctor-dark));border-radius:10px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}.logo-sub{font-size:11px;color:var(--sub)}
.sidebar-user{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:#f0fdfa}
.user-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--doctor),var(--doctor-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:700}
.user-role{display:inline-block;font-size:10px;background:var(--doctor-light);color:var(--doctor-dark);padding:2px 8px;border-radius:20px;font-weight:600;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 12px 0;overflow-y:auto}
.nav-section-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--sub);font-size:13.5px;font-weight:500;text-decoration:none;transition:.15s;margin-bottom:2px}
.nav-item:hover{background:#f0fdfa;color:var(--doctor)}.nav-item.active{background:var(--doctor-light);color:var(--doctor-dark);font-weight:700}
.nav-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}

/* ── Main ── */
.main{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:17px;font-weight:800}.topbar p{font-size:12px;color:var(--sub);margin-top:2px}
.content{padding:24px 28px;flex:1}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ftab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--sub);transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.ftab:hover{border-color:var(--doctor);color:var(--doctor)}.ftab.active{background:var(--doctor);color:#fff;border-color:var(--doctor)}
.search-box{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:7px 14px;font-size:13px;min-width:220px}
.search-box input{border:none;outline:none;font-family:inherit;font-size:13px;background:transparent;flex:1;color:var(--text)}

/* ── Appointment cards ── */
.appt-list{display:flex;flex-direction:column;gap:14px}
.appt-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:.2s}
.appt-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.bl-CONFIRMED{border-left:4px solid var(--doctor)}.bl-PENDING{border-left:4px solid var(--warning)}.bl-COMPLETED{border-left:4px solid var(--primary)}.bl-CANCELLED{border-left:4px solid #9ca3af}
.appt-inner{display:flex;align-items:center;gap:20px;padding:18px 20px}
.date-box{width:56px;flex-shrink:0;text-align:center;border-radius:12px;padding:10px 6px;background:var(--doctor-light)}
.date-day{font-size:22px;font-weight:800;color:var(--doctor-dark);line-height:1}
.date-mon{font-size:10px;font-weight:700;color:var(--doctor-dark);text-transform:uppercase;margin-top:2px}

.patient-info{flex:1;min-width:0}
.patient-name{font-size:15px;font-weight:700}
.patient-sub{font-size:12.5px;color:var(--sub);margin-top:3px}
.appt-meta{display:flex;align-items:center;gap:16px;margin-top:8px;flex-wrap:wrap}
.meta-item{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:4px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;flex-shrink:0}
.b-CONFIRMED{background:var(--doctor-light);color:var(--doctor-dark)}
.b-PENDING{background:#fef3c7;color:#92400e}
.b-COMPLETED{background:#e0e7ff;color:#3730a3}
.b-CANCELLED{background:#f3f4f6;color:#6b7280}

.appt-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s;text-decoration:none}
.btn-primary{background:var(--doctor);color:#fff}.btn-primary:hover{background:var(--doctor-dark)}
.btn-confirm{background:var(--doctor-light);color:var(--doctor-dark)}.btn-confirm:hover{background:#99f6e4}
.btn-cancel{background:var(--danger-light);color:var(--danger)}.btn-cancel:hover{background:#fecaca}
.btn-sm{padding:7px 14px;font-size:12px}

.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:17px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:13.5px;color:var(--sub);margin-bottom:24px}

.alert-success{background:var(--accent-light);color:#065f46;border:1px solid #6ee7b7;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px}
.alert-error{background:var(--danger-light);color:#991b1b;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px}

.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;background:rgba(255,255,255,.3);border-radius:10px;font-size:11px;font-weight:700;padding:0 6px;margin-left:4px}
.ftab.active .count-badge{background:rgba(255,255,255,.25)}
.count-badge-dark{background:#f3f4f6;color:var(--sub);border-radius:10px;font-size:11px;font-weight:700;padding:2px 7px;margin-left:4px}
</style>
</head>

<body>

<!-- Sidebar -->
<div th:replace="~{layout/layout-doctor :: sidebar(${profile})}"></div>

<!-- Main -->
<main class="main">

    <!-- Topbar -->
    <div class="topbar">
        <div>
            <h1>Lịch hẹn bệnh nhân</h1>
            <p>Quản lý và xử lý lịch hẹn của bạn</p>
        </div>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Success -->
        <div th:if="${successMessage}"
             class="alert-success"
             th:text="${successMessage}">
        </div>

        <!-- Error -->
        <div th:if="${errorMessage}"
             class="alert-error"
             th:text="${errorMessage}">
        </div>

        <!-- Search -->
        <div class="filter-bar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text"
                       placeholder="Tìm tên bệnh nhân..."
                       id="searchInput"
                       onkeyup="filterCards()"/>
            </div>
        </div>

        <!-- Appointment List -->
        <div class="appt-list" id="apptList">

            <!-- Empty -->
            <div th:if="${appointments == null or appointments.empty}"
                 class="empty-state">

                <div class="empty-icon">📅</div>

                <div class="empty-title">
                    Không có lịch hẹn nào
                </div>

                <div class="empty-sub">
                    Chưa có lịch hẹn được đặt
                </div>
            </div>

            <!-- Appointment Card -->
            <div th:each="a : ${appointments}"
                 th:class="${'appt-card bl-' + a.status.name()}"
                 th:attr="data-patient=${a.patient != null and a.patient.profile != null ? a.patient.profile.fullName : ''}">

                <div class="appt-inner">

                    <!-- Date -->
                    <div class="date-box">

                        <div class="date-day"
                             th:text="${a.appointmentDate != null ? #temporals.format(a.appointmentDate,'dd') : '--'}">
                            01
                        </div>

                        <div class="date-mon"
                             th:text="${a.appointmentDate != null ? 'Th.' + #temporals.format(a.appointmentDate,'M') : '--'}">
                            Th.1
                        </div>
                    </div>

                    <!-- Info -->
                    <div class="patient-info">

                        <div class="patient-name"
                             th:text="${a.patient != null and a.patient.profile != null ? a.patient.profile.fullName : 'Bệnh nhân'}">
                            Nguyễn Văn A
                        </div>

                        <div class="patient-sub"
                             th:text="${a.patient != null ? a.patient.email : ''}">
                            email@gmail.com
                        </div>

                        <div class="appt-meta">

                            <span class="meta-item">
                                🕙
                                <span th:text="${a.appointmentTime != null ? #strings.substring(a.appointmentTime.toString(),0,5) : '--:--'}">
                                    08:00
                                </span>
                            </span>

                            <span class="meta-item"
                                  th:if="${a.reason != null and !#strings.isEmpty(a.reason)}">
                                📝
                                <span th:text="${a.reason}">
                                    Đau đầu
                                </span>
                            </span>

                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="appt-actions">

                        <!-- Status -->
                        <span class="badge"
                              th:classappend="${'b-' + a.status.name()}">

                            <span th:text="${a.status.name() == 'PENDING'} ? '⏳ Chờ xác nhận' :
                                            (${a.status.name() == 'CONFIRMED'} ? '✅ Đã xác nhận' :
                                            (${a.status.name() == 'COMPLETED'} ? '🩺 Đã khám' :
                                            '❌ Đã hủy'))">
                            </span>

                        </span>

                        <!-- Confirm -->
                        <form th:if="${a.status.name() == 'PENDING'}"
                              th:action="@{/doctor/appointments/{id}/confirm(id=${a.id})}"
                              method="post"
                              style="display:inline">

                            <!-- CSRF TOKEN -->
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>

                            <button type="submit"
                                    class="btn btn-confirm btn-sm">
                                ✅ Xác nhận
                            </button>
                        </form>

                        <!-- View -->
                        <a th:if="${a.status.name() == 'CONFIRMED'}"
                           th:href="@{/doctor/appointments/{id}(id=${a.id})}"
                           class="btn btn-primary btn-sm">
                            🩺 Bắt đầu khám
                        </a>

                        <!-- Cancel -->
                        <form th:if="${a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED'}"
                              th:action="@{/doctor/appointments/{id}/cancel(id=${a.id})}"
                              method="post"
                              style="display:inline"
                              onsubmit="return confirm('Bạn có chắc muốn hủy lịch hẹn này không?')">

                            <!-- CSRF TOKEN -->
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>

                            <button type="submit"
                                    class="btn btn-cancel btn-sm">
                                ❌ Hủy
                            </button>

                        </form>

                    </div>

                </div>
            </div>

        </div>

    </div>

</main>

<script>

    function filterCards() {

        // Lấy text trong ô search
        const q = document.getElementById('searchInput')
            .value
            .toLowerCase();

        // Lặp qua từng card
        document.querySelectorAll('#apptList .appt-card')
            .forEach(card => {

                // Lấy tên bệnh nhân
                const name = (card.dataset.patient || '')
                    .toLowerCase();

                // Nếu tên chứa keyword thì hiện
                // không thì ẩn
                card.style.display = name.includes(q)
                    ? ''
                    : 'none';
            });
    }

</script>

</body>
</html>
