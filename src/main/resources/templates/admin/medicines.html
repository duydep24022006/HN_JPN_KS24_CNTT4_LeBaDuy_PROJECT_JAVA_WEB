<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục thuốc | Smart Healthcare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        /* Giữ nguyên toàn bộ CSS bạn đã cung cấp, không thay đổi */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sh-blue: #1a5fb4;
            --sh-blue-dark: #1353a0;
            --sh-blue-light: #e8f0fb;
            --sidebar-w: 220px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f9;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--sh-blue-dark);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar-logo {
            padding: 20px 18px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--sh-blue-dark);
            font-weight: 700;
            font-size: 16px;
        }

        .logo-text {
            color: white;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
        }

        .logo-sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
        }

        .nav-section {
            padding: 12px 0 4px;
        }

        .nav-label {
            padding: 4px 16px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            text-decoration: none;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.13);
            color: white;
            border-left-color: white;
        }

        .nav-item i {
            font-size: 16px;
            width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .admin-info:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .admin-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .admin-name {
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        .admin-role {
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: var(--sidebar-w);
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            background: white;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 16px;
            font-weight: 500;
            color: #111827;
        }

        .page-sub {
            font-size: 12px;
            color: #6b7280;
            margin-top: 1px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #6b7280;
            font-size: 16px;
            transition: background 0.15s;
            position: relative;
        }

        .icon-btn:hover {
            background: #f9fafb;
        }

        .notif-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 7px;
            height: 7px;
            background: #ef4444;
            border-radius: 50%;
            border: 1.5px solid white;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .card {
            background: white;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            margin-bottom: 16px;
            overflow-x: auto;
        }

        .btn-sm {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            background: white;
            color: #374151;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.15s;
            text-decoration: none;
        }

        .btn-sm:hover {
            background: #f9fafb;
        }

        .btn-primary {
            background: var(--sh-blue);
            color: white;
            border-color: var(--sh-blue);
        }

        .btn-primary:hover {
            background: var(--sh-blue-dark);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            font-size: 11px;
            color: #6b7280;
            padding: 8px 14px;
            text-align: left;
            font-weight: 500;
            background: #f8fafc;
            border-bottom: 1px solid #e5e7eb;
        }

        td {
            font-size: 12px;
            padding: 10px 14px;
            color: #111827;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover td {
            background: #f9fafb;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            display: inline-block;
        }

        .badge-green {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .action-btns {
            display: flex;
            gap: 4px;
        }

        .act-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #6b7280;
            transition: all 0.15s;
            text-decoration: none;
        }

        .act-btn:hover {
            background: #f9fafb;
        }

        .act-btn.danger:hover {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 15px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 7px 12px 7px 34px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            background: white;
            color: #111827;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--sh-blue);
        }
    </style>
</head>
<body>

<div th:replace="~{layout/layout :: sidebar}"></div>

<div class="main">
    <div class="topbar">
        <div>
            <div class="page-title">Danh mục thuốc</div>
            <div class="page-sub">Quản lý kho thuốc và giá cả</div>
        </div>
        <div class="topbar-actions">

        </div>
    </div>

    <div class="content">
        <div class="search-bar" style="display:flex;justify-content:space-between;align-items:center;width:100%;">
            <form th:action="@{/admin/medicines}" method="get" style="flex:1;display:flex;gap:10px;">
                <div class="search-wrap" style="flex:1;display:flex;align-items:center;">

                    <!-- giữ lại keyword đã nhập -->
                    <input type="text" class="search-input" name="keyword"
                           th:value="${param.keyword}" placeholder="Tìm thuốc theo tên, hoạt chất..."
                           style="flex:1;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;">
                </div>
                <select name="active" style="padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;">
                    <option value="" th:selected="${param.active == null}">Tất cả trạng thái</option>
                    <option value="true" th:selected="${param.active == 'true'}">Đang bán</option>
                    <option value="false" th:selected="${param.active == 'false'}">Ngừng bán</option>
                </select>
                <button type="submit" class="btn-sm btn-secondary">Lọc</button>
            </form>
            <a th:href="@{/admin/medicines/create}" class="btn-sm btn-primary" style="margin-left:10px;">
                <i class="ti ti-plus"></i> Thêm thuốc
            </a>
        </div>
        <div class="card">
            <table id="medicineTable">
                <thead>
                <tr>
                    <th>Tên thuốc</th>
                    <th>Hoạt chất</th>
                    <th>Đơn vị</th>
                    <th>Giá</th>
                    <th>Tồn kho</th>
                    <th>NSX</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="med : ${medicines}" th:data-active="${med.active}">
                    <td><span th:text="${med.name != null ? med.name : ''}" style="font-weight:500"></span></td>
                    <td th:text="${med.ingredient != null ? med.ingredient : ''}" style="color:#6b7280"></td>
                    <td th:text="${med.unit != null ? med.unit : ''}"></td>
                    <td th:text="${med.price != null ? med.price : ''}"></td>
                    <td>
                        <span th:text="${med.stockQuantity != null ? med.stockQuantity : 0}"
                              th:style="${med.stockQuantity != null and med.stockQuantity < 20 ? 'color:#b91c1c;font-weight:500' : 'font-weight:500'}"></span>
                    </td>
                    <td th:text="${med.manufacturer != null ? med.manufacturer : ''}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${med.active != null and med.active} ? 'badge-green' : 'badge-red'"
                              th:text="${med.active != null and med.active} ? 'Đang bán' : 'Ngừng bán'"></span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <a class="act-btn" th:href="@{/admin/medicines/edit/{id}(id=${med.id})}">
                                <i class="ti ti-edit"></i>
                            </a>
                            <form th:action="@{/admin/medicines/toggle/{id}(id=${med.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Thay đổi trạng thái thuốc này?')">
                                <button type="submit" class="act-btn danger" style="background:none;border:none;cursor:pointer;padding:0;">
                                    <i th:class="${med.active != null and med.active} ? 'ti ti-ban' : 'ti ti-shopping-cart'"></i>
                                </button>
                            </form>
                        </div>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>


</body>
</html>
