<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyệt đơn thuốc | Smart Healthcare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --sh-blue: #1a5fb4; --sh-blue-dark: #1353a0; --sh-blue-light: #e8f0fb; --sidebar-w: 220px; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f9; height: 100vh; display: flex; }
        .sidebar { width: var(--sidebar-w); background: var(--sh-blue-dark); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; position: fixed; left: 0; top: 0; }
        .sidebar-logo { padding: 20px 18px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-icon { width: 32px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--sh-blue-dark); font-weight: 700; font-size: 16px; }
        .logo-text { color: white; font-size: 14px; font-weight: 600; line-height: 1.2; }
        .logo-sub { color: rgba(255,255,255,0.6); font-size: 10px; }
        .nav-section { padding: 12px 0 4px; }
        .nav-label { padding: 4px 16px; font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 13px; transition: all 0.15s; border-left: 3px solid transparent; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: rgba(255,255,255,0.13); color: white; border-left-color: white; }
        .nav-item i { font-size: 16px; width: 18px; text-align: center; }
        .nav-badge { margin-left: auto; background: #ef4444; color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
        .sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.15s; }
        .admin-info:hover { background: rgba(255,255,255,0.08); }
        .admin-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; flex-shrink: 0; }
        .admin-name { color: white; font-size: 12px; font-weight: 500; }
        .admin-role { color: rgba(255,255,255,0.5); font-size: 10px; }
        .main { flex: 1; display: flex; flex-direction: column; margin-left: var(--sidebar-w); height: 100vh; overflow: hidden; }
        .topbar { background: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
        .page-title { font-size: 16px; font-weight: 500; color: #111827; }
        .page-sub { font-size: 12px; color: #6b7280; margin-top: 1px; }
        .topbar-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #e5e7eb; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #6b7280; font-size: 16px; transition: background 0.15s; position: relative; }
        .icon-btn:hover { background: #f9fafb; }
        .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: #ef4444; border-radius: 50%; border: 1.5px solid white; }
        .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 14px 16px; border: 1px solid #e5e7eb; }
        .stat-label { font-size: 11px; color: #6b7280; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .stat-val { font-size: 22px; font-weight: 500; color: #111827; }
        .stat-change { font-size: 11px; margin-top: 4px; }
        .stat-up { color: #16a34a; }
        .stat-down { color: #dc2626; }
        .stat-icon-circle { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .ic-blue { background: #dbeafe; color: #1d4ed8; }
        .ic-green { background: #dcfce7; color: #15803d; }
        .ic-amber { background: #fef3c7; color: #b45309; }
        .ic-red { background: #fee2e2; color: #b91c1c; }
        .card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; margin-bottom: 16px; overflow: hidden; }
        .card-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; }
        .card-title { font-size: 13px; font-weight: 500; color: #111827; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e5e7eb; background: white; color: #374151; display: inline-flex; align-items: center; gap: 5px; transition: background 0.15s; }
        .btn-sm:hover { background: #f9fafb; }
        .btn-primary { background: var(--sh-blue); color: white; border-color: var(--sh-blue); }
        .btn-primary:hover { background: var(--sh-blue-dark); }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 11px; color: #6b7280; padding: 8px 14px; text-align: left; font-weight: 500; background: #f8fafc; border-bottom: 1px solid #e5e7eb; }
        td { font-size: 12px; padding: 10px 14px; color: #111827; border-bottom: 1px solid #f1f5f9; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9fafb; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; display: inline-block; }
        .badge-green { background: #dcfce7; color: #15803d; }
        .badge-amber { background: #fef3c7; color: #b45309; }
        .badge-red { background: #fee2e2; color: #b91c1c; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .badge-gray { background: #f1f5f9; color: #64748b; }
        .action-btns { display: flex; gap: 4px; }
        .act-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #e5e7eb; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #6b7280; transition: all 0.15s; }
        .act-btn:hover { background: #f9fafb; }
        .act-btn.danger:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
        .search-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .search-wrap { flex: 1; position: relative; }
        .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 15px; pointer-events: none; }
        .search-input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: white; color: #111827; outline: none; }
        .search-input:focus { border-color: var(--sh-blue); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 11px; color: #6b7280; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { padding: 7px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px; background: white; color: #111827; outline: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--sh-blue); }
        .form-group textarea { resize: none; height: 64px; }
        .form-group input:disabled { background: #f1f5f9; color: #9ca3af; cursor: not-allowed; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .toggle { position: relative; display: inline-block; width: 34px; height: 20px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider-tog { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; border-radius: 20px; transition: .2s; }
        .slider-tog:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
        input:checked + .slider-tog { background: var(--sh-blue); }
        input:checked + .slider-tog:before { transform: translateX(14px); }
        .avatar-section { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; padding: 14px; background: var(--sh-blue-light); border-radius: 10px; }
        .big-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--sh-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; }
        .avatar-info .name { font-size: 14px; font-weight: 500; color: #111827; }
        .role-tag { font-size: 11px; color: var(--sh-blue); background: white; border: 1px solid var(--sh-blue); border-radius: 4px; padding: 1px 8px; margin-top: 4px; display: inline-block; }
        .section-title { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f1f5f9; }
        .specialty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .specialty-card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; padding: 16px; }
        .specialty-card.add-card { border: 2px dashed #e5e7eb; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer; min-height: 120px; }
        .specialty-card.add-card:hover { border-color: var(--sh-blue); background: var(--sh-blue-light); }
        .specialty-card.add-card i { font-size: 24px; color: #9ca3af; }
        .specialty-card.add-card:hover i { color: var(--sh-blue); }
        .specialty-card.add-card span { font-size: 12px; color: #9ca3af; }
        .specialty-card.add-card:hover span { color: var(--sh-blue); }
        .spec-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .spec-desc { font-size: 11px; color: #6b7280; margin-bottom: 10px; line-height: 1.5; }
        .doc-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div th:replace="~{layout/layout :: sidebar}"></div>
<div class="main">
    <div class="topbar">
        <div>
            <div class="page-title">Quản lý đơn thuốc</div>
            <div class="page-sub">Danh sách đơn thuốc trong hệ thống</div>
        </div>
    </div>
    <div class="content">

        <!-- Flash -->
        <div th:if="${successMessage}" style="background:#dcfce7;color:#15803d;border:1px solid #86efac;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;">
            <i class="ti ti-circle-check"></i> <span th:text="${successMessage}"></span>
        </div>

        <!-- Filter -->
        <form method="get" th:action="@{/admin/prescriptions}" style="background:white;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;">
            <div style="display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:end;">
                <div>
                    <label style="font-size:11px;color:#6b7280;display:block;margin-bottom:4px;">Tìm kiếm</label>
                    <div style="position:relative;">
                        <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:14px;"></i>
                        <input type="text" name="keyword" th:value="${keyword}"
                               style="width:100%;padding:7px 10px 7px 32px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;"
                               placeholder="Tên bệnh nhân, bác sĩ...">
                    </div>
                </div>
                <div>
                    <label style="font-size:11px;color:#6b7280;display:block;margin-bottom:4px;">Trạng thái</label>
                    <select name="status" style="width:100%;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;background:white;outline:none;">
                        <option value="">Tất cả</option>
                        <option th:each="st : ${statuses}" th:value="${st.name()}"
                                th:text="${st.name() == 'PENDING' ? 'Chờ cấp phát' : st.name() == 'DISPENSED' ? 'Đã cấp phát' : 'Đã hủy'}"
                                th:selected="${selectedStatus != null and selectedStatus.name() == st.name()}"></option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="btn-sm btn-primary" style="height:34px;">
                        <i class="ti ti-filter"></i> Lọc
                    </button>
                </div>
                <div>
                    <a th:href="@{/admin/prescriptions}" class="btn-sm" style="height:34px;display:inline-flex;align-items:center;">
                        <i class="ti ti-refresh"></i> Xóa lọc
                    </a>
                </div>
            </div>
        </form>

        <div style="font-size:12px;color:#6b7280;margin-bottom:10px;">
            Tìm thấy <strong th:text="${#lists.size(prescriptions)}">0</strong> đơn thuốc
        </div>

        <div class="card">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Bệnh nhân</th>
                    <th>Bác sĩ</th>
                    <th>Ngày tạo</th>
                    <th>Trạng thái</th>
                    <th>Ngày cấp phát</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="presc : ${prescriptions}">
                    <td style="font-size:11px;color:#6b7280;" th:text="${presc.id}"></td>
                    <td>
                        <div th:if="${presc.medicalRecord?.appointment?.patient?.profile != null}">
                            <div style="font-weight:500;font-size:13px;" th:text="${presc.medicalRecord.appointment.patient.profile.fullName}"></div>
                        </div>
                        <div th:if="${presc.medicalRecord?.appointment?.patient?.profile == null}"
                             style="font-size:12px;color:#6b7280;" th:text="${presc.medicalRecord?.appointment?.patient?.email ?: '-'}"></div>
                    </td>
                    <td>
                        <div th:if="${presc.medicalRecord?.appointment?.doctor?.user?.profile != null}"
                             style="font-size:12px;" th:text="${presc.medicalRecord.appointment.doctor.user.profile.fullName}"></div>
                        <div th:if="${presc.medicalRecord?.appointment?.doctor?.user?.profile == null}"
                             style="font-size:12px;color:#6b7280;">-</div>
                    </td>
                    <td style="font-size:12px;" th:text="${presc.createdAt != null ? #temporals.format(presc.createdAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${presc.status?.name() == 'PENDING' ? 'badge-amber' : presc.status?.name() == 'DISPENSED' ? 'badge-green' : 'badge-red'}"
                              th:text="${presc.status?.name() == 'PENDING' ? 'Chờ cấp phát' : presc.status?.name() == 'DISPENSED' ? 'Đã cấp phát' : 'Đã hủy'}"></span>
                    </td>
                    <td style="font-size:12px;" th:text="${presc.dispensedAt != null ? #temporals.format(presc.dispensedAt, 'dd/MM/yyyy') : '-'}"></td>
                    <td>
                        <a th:href="@{'/admin/prescriptions/' + ${presc.id}}" class="act-btn" title="Xem chi tiết">
                            <i class="ti ti-eye"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(prescriptions)}">
                    <td colspan="7" style="text-align:center;padding:60px 20px;color:#9ca3af;">
                        <i class="ti ti-prescription" style="font-size:36px;display:block;margin-bottom:10px;"></i>
                        Không có đơn thuốc nào
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
