<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lịch hẹn | Smart Healthcare</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#1e40af;--primary-dark:#1340a8;--primary-light:#dbeafe;--accent:#10b981;--accent-light:#d1fae5;--warning:#f59e0b;--warning-light:#fef3c7;--danger:#ef4444;--danger-light:#fee2e2;--text:#1f2937;--sub:#64748b;--border:#e5e7eb;--bg:#f8fafc;--white:#fff;--sw:260px;--r:14px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);display:flex;min-height:100vh;color:var(--text)}
.sidebar{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.06)}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;line-height:1.2}.logo-sub{font-size:11px;color:var(--sub)}
.sidebar-user{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:#f9fafb}
.user-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1e40af);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:700}
.user-role{display:inline-block;font-size:10px;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:20px;font-weight:600;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 12px 0;overflow-y:auto}
.nav-section-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--sub);font-size:13.5px;font-weight:500;text-decoration:none;transition:.15s;margin-bottom:2px}
.nav-item:hover{background:#f0f4ff;color:var(--primary)}.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:700}
.nav-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.main{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:17px;font-weight:800}.topbar p{font-size:12px;color:var(--sub);margin-top:2px}
.content{padding:24px 28px;flex:1}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ftab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--sub);transition:.15s;text-decoration:none;display:inline-block}
.ftab:hover{border-color:var(--primary);color:var(--primary)}.ftab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-book{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;margin-left:auto}
.btn-book:hover{background:var(--primary-dark)}
.appt-list{display:flex;flex-direction:column;gap:14px}
.appt-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:.2s}
.appt-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.bl-CONFIRMED{border-left:4px solid var(--accent)}.bl-PENDING{border-left:4px solid var(--warning)}.bl-COMPLETED{border-left:4px solid var(--primary)}.bl-CANCELLED{border-left:4px solid #9ca3af}
.appt-inner{display:flex;align-items:center;gap:20px;padding:18px 20px}
.date-box{width:56px;flex-shrink:0;text-align:center;border-radius:12px;padding:10px 6px;background:var(--primary-light)}
.date-day{font-size:22px;font-weight:800;color:var(--primary);line-height:1}
.date-mon{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;margin-top:2px}
.date-year{font-size:10px;color:var(--sub);margin-top:1px}
.appt-doc{flex:1;min-width:0}
.doc-name{font-size:15px;font-weight:700}.doc-spec{font-size:12.5px;color:var(--sub);margin-top:3px}
.appt-meta{display:flex;align-items:center;gap:16px;margin-top:8px;flex-wrap:wrap}
.meta-item{font-size:12px;color:var(--sub)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;flex-shrink:0}
.b-CONFIRMED{background:#d1fae5;color:#065f46}.b-PENDING{background:#fef3c7;color:#92400e}.b-COMPLETED{background:#e0e7ff;color:#3730a3}.b-CANCELLED{background:#f3f4f6;color:#6b7280}
.appt-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s;text-decoration:none}
.btn-cancel{background:var(--danger-light);color:var(--danger)}.btn-cancel:hover{background:#fecaca}
.btn-rebook{background:var(--accent-light);color:#065f46}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:17px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:13.5px;color:var(--sub);margin-bottom:24px}
.alert-success{background:var(--accent-light);color:#065f46;border:1px solid #6ee7b7;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px}
.alert-error{background:var(--danger-light);color:#991b1b;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>
<div th:replace="~{layout/layout-patient :: sidebar(${profile})}"></div>
<main class="main">
<div class="topbar">
    <div><h1>Lịch hẹn của tôi</h1><p>Quản lý tất cả lịch khám đã đặt</p></div>
</div>
<div class="content">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>
    <div class="filter-bar">
        <a th:href="@{/patient/appointments}" class="ftab" th:classappend="${selectedStatus == null} ? ' active' : ''">Tất cả</a>
        <a th:href="@{/patient/appointments(status='CONFIRMED')}" class="ftab" th:classappend="${selectedStatus == 'CONFIRMED'} ? ' active' : ''">✅ Xác nhận</a>
        <a th:href="@{/patient/appointments(status='PENDING')}" class="ftab" th:classappend="${selectedStatus == 'PENDING'} ? ' active' : ''">⏳ Chờ xác nhận</a>
        <a th:href="@{/patient/appointments(status='COMPLETED')}" class="ftab" th:classappend="${selectedStatus == 'COMPLETED'} ? ' active' : ''">🩺 Đã khám</a>
        <a th:href="@{/patient/appointments(status='CANCELLED')}" class="ftab" th:classappend="${selectedStatus == 'CANCELLED'} ? ' active' : ''">❌ Đã hủy</a>
        <a th:href="@{/patient/appointments/booking}" class="btn-book">📅 Đặt lịch mới</a>
    </div>
    <div class="appt-list">
        <div th:if="${appointments.empty}" class="empty-state">
            <div class="empty-icon">📅</div>
            <div class="empty-title">Chưa có lịch hẹn nào</div>
            <div class="empty-sub">Đặt lịch khám để gặp bác sĩ ngay hôm nay</div>
            <a th:href="@{/patient/appointments/booking}" class="btn-book">📅 Đặt lịch ngay</a>
        </div>
        <div th:each="a : ${appointments}"
             th:class="${'appt-card bl-' + a.status.name()}">
            <div class="appt-inner">
                <div class="date-box"
                     th:style="${a.status.name() == 'PENDING'} ? 'background:var(--warning-light)' :
                                (${a.status.name() == 'COMPLETED'} ? 'background:#e0e7ff' :
                                (${a.status.name() == 'CANCELLED'} ? 'background:#f3f4f6' : ''))">
                    <div class="date-day"
                         th:style="${a.status.name() == 'PENDING'} ? 'color:var(--warning)' :
                                    (${a.status.name() == 'COMPLETED'} ? 'color:#3730a3' :
                                    (${a.status.name() == 'CANCELLED'} ? 'color:#9ca3af' : ''))"
                         th:text="${#temporals.format(a.appointmentDate,'dd')}">01</div>
                    <div class="date-mon"
                         th:style="${a.status.name() == 'PENDING'} ? 'color:var(--warning)' :
                                    (${a.status.name() == 'COMPLETED'} ? 'color:#3730a3' :
                                    (${a.status.name() == 'CANCELLED'} ? 'color:#9ca3af' : ''))"
                         th:text="'Th.' + ${#temporals.format(a.appointmentDate,'M')}">Th.1</div>
                    <div class="date-year" th:text="${#temporals.format(a.appointmentDate,'yyyy')}">2026</div>
                </div>
                <div class="appt-doc">
                    <div class="doc-name"
                         th:text="${a.doctor != null and a.doctor.user != null and a.doctor.user.profile != null
         ? 'BS. ' + a.doctor.user.profile.fullName
         : 'BS. —'}">
                        BS.
                    </div>

                    <div class="doc-spec"
                         th:text="${a.doctor != null and a.doctor.specialty != null
         ? a.doctor.specialty.name
         : ''}">
                    </div>

                    <div class="appt-meta">
                        <span class="meta-item"
                              th:text="${'🕙 ' + (a.appointmentTime != null
              ? a.appointmentTime.toString().substring(0,5)
              : '—')}">
                        </span>

                        <span class="meta-item"
                              th:if="${a.reason != null and !#strings.isEmpty(a.reason)}"
                              th:text="${'📝 ' + a.reason}">
                        </span>
                    </div>
                </div>
                <div class="appt-actions">
                    <span class="badge"
                          th:class="'badge b-' + ${a.status.name()}"
                          th:text="${a.status.name() == 'CONFIRMED' ? '✅ Đã xác nhận' :
                                     a.status.name() == 'PENDING' ? '⏳ Chờ xác nhận' :
                                     a.status.name() == 'COMPLETED' ? '🩺 Đã khám' : '❌ Đã hủy'}">—</span>
                    <div style="display:flex;gap:6px">
                        <form th:if="${a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED'}"
                              th:action="@{/patient/appointments/{id}/cancel(id=${a.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Bạn có chắc muốn hủy lịch hẹn này?')">
                            <button type="submit" class="btn-sm btn-cancel">🚫 Hủy lịch</button>
                        </form>
                        <a th:if="${a.status.name() == 'COMPLETED'}" th:href="@{/patient/medical-records}" class="btn-sm btn-rebook">📋 Xem bệnh án</a>
                        <a th:if="${a.status.name() == 'CANCELLED'}" th:href="@{/patient/appointments/booking}" class="btn-sm btn-rebook">🔄 Đặt lại</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
