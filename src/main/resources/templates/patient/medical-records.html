<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Bệnh án | Smart Healthcare</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

    <style> *,*::before,*::after{box-sizing:border-box;margin:0;padding:0} :root{--primary:#1e40af;--primary-dark:#1340a8;--primary-light:#dbeafe;--accent:#10b981;--accent-light:#d1fae5;--warning:#f59e0b;--warning-light:#fef3c7;--danger:#ef4444;--text:#1f2937;--sub:#64748b;--border:#e5e7eb;--bg:#f8fafc;--white:#fff;--sw:260px;--r:14px} body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);display:flex;min-height:100vh;color:var(--text)} .sidebar{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.06)} .sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;border-bottom:1px solid var(--border)} .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0} .logo-text{font-size:14px;font-weight:800;line-height:1.2}.logo-sub{font-size:11px;color:var(--sub)} .sidebar-user{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:#f9fafb} .user-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1e40af);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0} .user-name{font-size:13px;font-weight:700} .user-role{display:inline-block;font-size:10px;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:20px;font-weight:600;margin-top:2px} .sidebar-nav{flex:1;padding:12px 12px 0;overflow-y:auto} .nav-section-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 6px} .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--sub);font-size:13.5px;font-weight:500;text-decoration:none;transition:.15s;margin-bottom:2px} .nav-item:hover{background:#f0f4ff;color:var(--primary)}.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:700} .nav-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}.sidebar-footer{padding:12px;border-top:1px solid var(--border)} .main{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh} .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50} .topbar h1{font-size:17px;font-weight:800}.topbar p{font-size:12px;color:var(--sub);margin-top:2px} .content{padding:24px 28px;flex:1} .stat-row{display:flex;gap:16px;margin-bottom:24px} .stat-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);flex:1} .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0} .si-blue{background:var(--primary-light)}.si-green{background:var(--accent-light)}.si-yellow{background:var(--warning-light)} .stat-value{font-size:22px;font-weight:800;line-height:1}.stat-label{font-size:12px;color:var(--sub);margin-top:3px} .record-list{display:flex;flex-direction:column;gap:16px} .record-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden} .rc-header{display:flex;align-items:center;gap:16px;padding:18px 20px;border-bottom:1px solid var(--border)} .rc-date{width:52px;flex-shrink:0;text-align:center;border-radius:10px;padding:8px 4px;background:#e0e7ff} .rc-day{font-size:20px;font-weight:800;color:#3730a3;line-height:1} .rc-mon{font-size:10px;font-weight:700;color:#3730a3;text-transform:uppercase;margin-top:2px} .rc-year{font-size:10px;color:var(--sub);margin-top:1px} .rc-info{flex:1} .rc-title{font-size:15px;font-weight:700} .rc-sub{font-size:12.5px;color:var(--sub);margin-top:3px} .rc-meta{display:flex;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap} .rc-meta span{font-size:12px;color:var(--sub)} .rc-body{padding:18px 20px} .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} .detail-item label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px} .detail-item p{font-size:13.5px;color:var(--text);line-height:1.6} .detail-item.full{grid-column:1/-1} .empty-state{text-align:center;padding:60px;color:var(--sub)} .empty-icon{font-size:56px;margin-bottom:16px}.empty-title{font-size:17px;font-weight:700;margin-bottom:8px} .btn-book{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;transition:.15s} .btn-book:hover{background:var(--primary-dark)} </style>
</head>

<body>

<div th:replace="~{layout/layout-patient :: sidebar(${profile})}"></div>

<main class="main">

    <div class="topbar">
        <div>
            <h1>Lịch sử bệnh án</h1>
            <p>Xem toàn bộ hồ sơ khám bệnh của bạn</p>
        </div>
    </div>

    <div class="content">

        <div class="stat-row">
            <div class="stat-card">
                <div class="stat-icon si-blue">📋</div>

                <div>
                    <div class="stat-value"
                         th:text="${totalRecords}">
                        0
                    </div>

                    <div class="stat-label">
                        Bệnh án lưu
                    </div>
                </div>
            </div>
        </div>

        <div class="record-list">

            <!-- EMPTY -->
            <div th:if="${records.empty}" class="empty-state">

                <div class="empty-icon">📋</div>

                <div class="empty-title">
                    Chưa có bệnh án nào
                </div>

                <p style="font-size:13.5px;margin-bottom:24px">
                    Bệnh án sẽ được bác sĩ tạo sau khi khám xong
                </p>

                <a th:href="@{/patient/appointments/booking}"
                   class="btn-book">
                    📅 Đặt lịch khám
                </a>

            </div>

            <!-- RECORD -->
            <div th:each="r : ${records}" class="record-card">

                <div class="rc-header">

                    <div class="rc-date">

                        <div class="rc-day"
                             th:text="${r.createdAt != null ? #temporals.format(r.createdAt,'dd') : '—'}">
                            01
                        </div>

                        <div class="rc-mon"
                             th:text="${r.createdAt != null ? #temporals.format(r.createdAt,'MM') : '—'}">
                            01
                        </div>

                        <div class="rc-year"
                             th:text="${r.createdAt != null ? #temporals.format(r.createdAt,'yyyy') : '—'}">
                            2026
                        </div>

                    </div>

                    <div class="rc-info">

                        <div class="rc-title"
                             th:text="${r.diagnosis != null ? r.diagnosis : 'Chưa có chẩn đoán'}">
                            Chẩn đoán
                        </div>

                        <div class="rc-sub"
                             th:text="${r.appointment != null
                                and r.appointment.doctor != null
                                and r.appointment.doctor.user != null
                                and r.appointment.doctor.user.profile != null
                                and r.appointment.doctor.user.profile.fullName != null
                                ? 'BS. ' + r.appointment.doctor.user.profile.fullName
                                : 'BS. —'}">
                            BS.
                        </div>

                        <div class="rc-meta">

                            <span th:text="${r.appointment != null
                                and r.appointment.appointmentDate != null
                                ? '📅 ' + #temporals.format(r.appointment.appointmentDate,'dd/MM/yyyy')
                                : '📅 —'}">
                            </span>

                            <span th:if="${r.followUpDate != null}"
                                  th:text="${'🔄 Tái khám: ' + #temporals.format(r.followUpDate,'dd/MM/yyyy')}">
                            </span>

                        </div>

                    </div>

                </div>

                <div class="rc-body">

                    <div class="detail-grid">

                        <div class="detail-item"
                             th:if="${r.symptoms != null and !#strings.isEmpty(r.symptoms)}">

                            <label>🤒 Triệu chứng</label>

                            <p th:text="${r.symptoms}"></p>

                        </div>

                        <div class="detail-item"
                             th:if="${r.diagnosis != null and !#strings.isEmpty(r.diagnosis)}">

                            <label>🩺 Chẩn đoán</label>

                            <p th:text="${r.diagnosis}"></p>

                        </div>

                        <div class="detail-item full"
                             th:if="${r.treatmentPlan != null and !#strings.isEmpty(r.treatmentPlan)}">

                            <label>💊 Phác đồ điều trị</label>

                            <p th:text="${r.treatmentPlan}"></p>

                        </div>

                        <div class="detail-item full"
                             th:if="${r.notes != null and !#strings.isEmpty(r.notes)}">

                            <label>📝 Ghi chú của bác sĩ</label>

                            <p th:text="${r.notes}"></p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
