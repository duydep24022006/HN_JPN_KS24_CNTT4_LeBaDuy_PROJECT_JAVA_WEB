<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lỗi - Smart Healthcare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-container { text-align: center; padding: 80px 20px; }
        .error-code { font-size: 6rem; font-weight: bold; color: #e74c3c; margin: 0; }
        .error-msg { font-size: 1.2rem; color: #555; margin: 16px 0 32px; }
    </style>
</head>
<body>
<div class="error-container">
    <p class="error-code" th:text="${errorCode} ?: '500'">500</p>
    <p class="error-msg" th:text="${errorMessage} ?: 'Đã xảy ra lỗi. Vui lòng thử lại.'">Đã xảy ra lỗi.</p>
    <a href="/" class="btn btn-primary">Về trang chủ</a>
</div>
</body>
</html>
